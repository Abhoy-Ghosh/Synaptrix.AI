<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>AI Research Architecture Graph</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>

    <style>

       body{

    margin:0;

    overflow:hidden;

    background:#0F1522;

    font-family:monospace;
}
#mynetwork{

    width:100%;

    height:100vh;

    overflow:hidden;

    border-radius:40px;

    background:transparent;
}
        canvas{
            filter:
                saturate(1.05);
        }

        /* =========================================
           TOGGLE BUTTONS
        ========================================= */

        .toggleBtn{

            position:fixed;

            top:18px;

            z-index:10000;

            background:
                rgba(13,13,26,0.92);

            border:
                1px solid #2a2a4a;

            color:white;

            padding:
                11px 16px;

            border-radius:14px;

            cursor:pointer;

            font-size:12px;

            letter-spacing:0.08em;

            text-transform:uppercase;

            backdrop-filter:blur(12px);

            transition:
                all 0.25s ease;

            box-shadow:
                0 6px 22px rgba(0,0,0,0.4);
        }

        .toggleBtn:hover{

            border-color:#4da6ff;

            transform:
                translateY(-2px);

            box-shadow:
                0 0 22px rgba(77,166,255,0.28);
        }

        #legendToggle{
            right:18px;
        }

        #infoToggle{
            left:18px;
        }

        /* =========================================
           PANEL SYSTEM
        ========================================= */

        .panel{

            transition:
                transform 0.35s ease,
                opacity 0.35s ease;
        }

        .panel.collapsed{

            opacity:0;
            pointer-events:none;
        }

        #legend.collapsed{

            transform:
                translateX(120%);
        }

        #infoPanel.collapsed{

            transform:
                translateX(-120%);
        }

        /* =========================================
           LEGEND
        ========================================= */

        #legend{

            position:fixed;

            top:70px;
            right:18px;

            background:
                rgba(10,12,24,0.95);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:18px;

            padding:20px;

            color:#d7dcff;

            z-index:9999;

            box-shadow:
                0 10px 42px rgba(0,0,0,0.45);

            backdrop-filter:blur(16px);

            min-width:190px;
        }

        #legend b{

            color:white;

            font-size:15px;

            letter-spacing:0.08em;
        }

        .row{

            margin-top:12px;

            display:flex;

            align-items:center;

            gap:10px;
        }

        .dot{

            font-size:16px;
        }

        /* =========================================
           INFO PANEL
        ========================================= */

        #infoPanel{

            position:fixed;

            left:18px;
            top:70px;

            width:340px;

            min-height:180px;
            max-height:80vh;

            overflow-y:auto;

            background:
                rgba(10,12,24,0.96);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:18px;

            padding:22px;

            color:#dfe6ff;

            z-index:9999;

            box-shadow:
                0 10px 42px rgba(0,0,0,0.45);

            backdrop-filter:blur(16px);
        }

        #infoTitle{

            font-size:17px;

            color:white;

            margin-bottom:16px;

            font-weight:bold;

            letter-spacing:0.05em;
        }

        #infoContent{

            color:#b6c2ef;

            line-height:1.7;

            font-size:13px;
        }

        .info-section{
            margin-bottom:18px;
        }

        .info-label{

            color:#6fa8ff;

            font-weight:bold;

            margin-bottom:7px;

            text-transform:uppercase;

            letter-spacing:0.06em;

            font-size:11px;
        }

        ul{
            padding-left:18px;
        }

        li{
            margin-bottom:7px;
        }

        .vis-network canvas{

    background:transparent !important;
}

    </style>

</head>

<body>

<!-- =========================================
     TOGGLES
========================================= -->

<button id="legendToggle" class="toggleBtn">
    Layers
</button>

<button id="infoToggle" class="toggleBtn">
    Info
</button>

<!-- =========================================
     INFO PANEL
========================================= -->

<div id="infoPanel" class="panel collapsed">

    <div id="infoTitle">
        Node Information
    </div>

    <div id="infoContent">
        Click any node to inspect architecture details.
    </div>

</div>

<!-- =========================================
     LEGEND
========================================= -->

<div id="legend" class="panel collapsed">

    <b>⬡ LAYERS</b>

    <div class="row">
        <span class="dot" style="color:#ff4d4d">●</span>
        Core
    </div>

    <div class="row">
        <span class="dot" style="color:#4da6ff">●</span>
        Agents
    </div>

    <div class="row">
        <span class="dot" style="color:#66cc66">●</span>
        Services
    </div>

    <div class="row">
        <span class="dot" style="color:#ffcc00">●</span>
        Storage
    </div>

    <div class="row">
        <span class="dot" style="color:#ff66cc">●</span>
        Feedback
    </div>

    <hr style="border-color:#2a2a4a; margin-top:16px;">

    <div class="row" style="color:#8899ff">
        ── Pipeline Flow
    </div>

    <div class="row" style="color:#556677">
        ╌╌ File Mapping
    </div>

</div>

<!-- =========================================
     NETWORK
========================================= -->

<div id="mynetwork"></div>

<script>

    const nodes = new vis.DataSet([
        {
            id:"query",
            label:"query",
            shape:"circle",
            size:42,
            color:"#ff4d4d",
            font:{color:"white"}
        },

        {
            id:"insight_extractor",
            label:"insight\nextractor",
            shape:"circle",
            size:42,
            color:"#ff4d4d",
            font:{color:"white"}
        },

        {
            id:"output",
            label:"output",
            shape:"circle",
            size:42,
            color:"#ff4d4d",
            font:{color:"white"}
        },

        {
            id:"retriever",
            label:"retriever",
            shape:"circle",
            size:30,
            color:"#4da6ff",
            font:{color:"white"}
        },

        {
            id:"summarizer",
            label:"summarizer",
            shape:"circle",
            size:30,
            color:"#4da6ff",
            font:{color:"white"}
        },

        {
            id:"analyzer",
            label:"analyzer",
            shape:"circle",
            size:30,
            color:"#4da6ff",
            font:{color:"white"}
        },

        {
            id:"gap_finder",
            label:"gap\nfinder",
            shape:"circle",
            size:30,
            color:"#4da6ff",
            font:{color:"white"}
        },

        {
            id:"llm_service",
            label:"llm\nservice",
            shape:"circle",
            size:36,
            color:"#66cc66",
            font:{color:"white"}
        },

        {
            id:"vector_store",
            label:"vector\nstore",
            shape:"circle",
            size:24,
            color:"#ffcc00",
            font:{color:"white"}
        },

        {
            id:"cache",
            label:"cache",
            shape:"circle",
            size:24,
            color:"#ffcc00",
            font:{color:"white"}
        },

        {
            id:"feedback",
            label:"feedback",
            shape:"circle",
            size:26,
            color:"#ff66cc",
            font:{color:"white"}
        }

    ]);

    const edges = new vis.DataSet([

        {from:"query", to:"retriever"},
        {from:"retriever", to:"vector_store"},
        {from:"retriever", to:"cache"},
        {from:"vector_store", to:"insight_extractor"},
        {from:"cache", to:"insight_extractor"},

        {from:"insight_extractor", to:"summarizer"},
        {from:"insight_extractor", to:"analyzer"},
        {from:"insight_extractor", to:"gap_finder"},

        {from:"summarizer", to:"llm_service"},
        {from:"analyzer", to:"llm_service"},
        {from:"gap_finder", to:"llm_service"},

        {from:"llm_service", to:"output"},
        {from:"output", to:"feedback"}

    ]);

    const options = {

        physics:{

            enabled:true,

            solver:"forceAtlas2Based",

          forceAtlas2Based:{

    gravitationalConstant:-80,

    centralGravity:0.015,

    springLength:140,

    springConstant:0.03,

    damping:0.90,

    avoidOverlap:1
},

            stabilization:{
                enabled:true,
                iterations:400
            }
        },

        edges:{

            arrows:{
                to:{
                    enabled:true,
                    scaleFactor:0.7
                }
            },

            width:2,

            smooth:{
                type:"continuous"
            },

            color:{
                color:"#5566bb",
                highlight:"#ffffff",
                hover:"#aaaaff"
            }
        },

        nodes:{

            borderWidth:2,

            borderWidthSelected:4,

            shadow:{
                enabled:true,
                size:16,
                color:"rgba(0,0,0,0.55)"
            },

            font:{
                face:"monospace",
                size:13,
                color:"white"
            }
        },

 interaction:{
    hover:true,
    dragNodes:true,
    dragView:true,
    hideEdgesOnDrag:false,
    zoomView:true,
    zoomSpeed:0.28
}
    };

    const container =
        document.getElementById("mynetwork");

    const data = {
        nodes:nodes,
        edges:edges
    };

   const network =
    new vis.Network(
        container,
        data,
        options
    );

/* =========================================
   CINEMATIC CENTERING
========================================= */

setTimeout(() => {

    network.moveTo({

        position:{
            x:120,
            y:40
        },

        scale:0.82,

        animation:{
            duration:1800,
            easingFunction:"easeInOutQuad"
        }

    });

}, 500);

    /* =========================================
       PANEL TOGGLES
    ========================================= */

    const legend =
        document.getElementById("legend");

    const infoPanel =
        document.getElementById("infoPanel");

    document
        .getElementById("legendToggle")
        .onclick = () => {

            legend.classList.toggle("collapsed");
    };

    document
        .getElementById("infoToggle")
        .onclick = () => {

            infoPanel.classList.toggle("collapsed");
    };

    /* =========================================
       NODE INFORMATION
    ========================================= */

    const nodeInfo = {

        retriever:{
            title:"RETRIEVER AGENT",
            layer:"Agent Layer",
            purpose:"Fetches relevant research papers.",
            details:[
                "Uses Semantic Scholar API",
                "Uses arXiv fallback",
                "Filters top relevant papers"
            ]
        },

        vector_store:{
            title:"VECTOR STORE",
            layer:"Storage Layer",
            purpose:"Stores semantic embeddings.",
            details:[
                "Supports semantic search",
                "Stores vector representations",
                "Improves contextual retrieval"
            ]
        },

        cache:{
            title:"CACHE SYSTEM",
            layer:"Storage Layer",
            purpose:"Reduces repeated API and LLM calls.",
            details:[
                "Stores previous outputs",
                "Improves response speed",
                "Reduces token usage"
            ]
        },

        insight_extractor:{
            title:"INSIGHT EXTRACTOR",
            layer:"Core Intelligence",
            purpose:"Extracts structured research insights.",
            details:[
                "Extracts keywords",
                "Finds technical insights",
                "Builds structured research context"
            ]
        },

        summarizer:{
            title:"SUMMARIZER AGENT",
            layer:"Research Agent",
            purpose:"Creates high-level summaries.",
            details:[
                "Builds concise summaries",
                "Finds common themes",
                "Extracts important findings"
            ]
        },

        analyzer:{
            title:"ANALYZER AGENT",
            layer:"Research Agent",
            purpose:"Performs deeper research reasoning.",
            details:[
                "Detects research patterns",
                "Finds agreements/disagreements",
                "Identifies trends"
            ]
        },

        gap_finder:{
            title:"GAP FINDER",
            layer:"Research Agent",
            purpose:"Finds unexplored research areas.",
            details:[
                "Detects research limitations",
                "Finds future directions",
                "Identifies strategic opportunities"
            ]
        },

        llm_service:{
            title:"LLM SERVICE",
            layer:"Service Layer",
            purpose:"Centralized AI inference gateway.",
            details:[
                "Gemini primary model",
                "Groq fallback model",
                "Caching + grounding logic"
            ]
        },

        output:{
            title:"OUTPUT NODE",
            layer:"Core Layer",
            purpose:"Final research intelligence output.",
            details:[
                "Combines agent outputs",
                "Builds final research report",
                "Returns structured insights"
            ]
        }
    };

    /* =========================================
       CLICK HANDLER
    ========================================= */

    network.on("click", function(params){

        if(params.nodes.length > 0){

            infoPanel.classList.remove("collapsed");

            const nodeId =
                params.nodes[0];

            const info =
                nodeInfo[nodeId];

            if(info){

                document
                    .getElementById("infoTitle")
                    .innerText =
                    info.title;

                document
                    .getElementById("infoContent")
                    .innerHTML = `

                    <div class="info-section">

                        <div class="info-label">
                            Layer
                        </div>

                        ${info.layer}

                    </div>

                    <div class="info-section">

                        <div class="info-label">
                            Purpose
                        </div>

                        ${info.purpose}

                    </div>

                    <div class="info-section">

                        <div class="info-label">
                            Responsibilities
                        </div>

                        <ul>
                            ${info.details.map(
                                d => `<li>${d}</li>`
                            ).join("")}
                        </ul>

                    </div>
                `;
            }
        }
    });

</script>

</body>
</html>
